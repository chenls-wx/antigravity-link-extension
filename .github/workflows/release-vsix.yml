name: Release VSIX

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run vscode:prepublish

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: "*.vsix"

      - name: Upload VSIX to release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
